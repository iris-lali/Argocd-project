apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: web
  namespace: dev
  labels:
    app: nginx
spec: 
  replicas: 3
  selector:   
    matchLabels:
      app: nginx
  serviceName: nginx
  template: 
    metadata:
      labels:
        app: nginx 
    spec:       
      containers:
      - image: registry.k8s.io/nginx-slim:0.8
        name: nginx-statefulset
        volumeMounts:
          - mountPath: /usr/share/nginx/html
            name: www
        ports: 
          - containerPort: 80
            name: www
  volumeClaimTemplates:
    - metadata:
        name: www
      spec:   
        storageClassName: do-block-storage-retain
        accessModes: [ "ReadWriteOnce" ]
        resources:
          requests: 
            storage: 1Gi
    

    